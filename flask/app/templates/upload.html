{% extends "base.html" %}
{% block title %}Upload — PasteBoard{% endblock %}
{% block content %}
  <h1>Upload a File</h1>
  <form method="POST" enctype="multipart/form-data">
    <label for="file">Choose a file</label>
    <input type="file" id="file" name="file">
    <button type="submit">Upload</button>
  </form>
  <h3>View an uploaded file</h3>
  <form method="GET" action="">
    <input type="text" name="filename" placeholder="Enter filename e.g. notes.txt">
    <button type="button" onclick="var f=document.querySelector('[name=filename]').value; window.location='/uploads/'+f;">View File</button>
  </form>
{% endblock %}
